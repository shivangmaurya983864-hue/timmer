<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC CGL | Growth Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg: #020202;
            --card: #0d0d0d;
            --accent: #d17fb1; 
            --gold: #fcf6ba;
            --neon: #64FFDA;
        }

        body {
            background-color: var(--bg); color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px; padding-top: 90px;
        }

        .golden-text { 
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #aa771c 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px; background: rgba(2, 2, 2, 0.9);
            backdrop-filter: blur(15px); z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .back-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            width: 45px; height: 45px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
        }

        .stat-card {
            background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px; padding: 25px; position: relative;
        }

        .tag-premium {
            background: rgba(100, 255, 218, 0.1); color: var(--neon);
            padding: 5px 12px; border-radius: 20px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
        }

        canvas { filter: drop-shadow(0 0 10px rgba(209, 127, 177, 0.2)); }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left text-gray-400"></i></a>
        <h1 class="text-sm font-black uppercase tracking-[0.3em] golden-text">Performance Analysis</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto space-y-6">

        <div class="stat-card text-center">
            <p class="text-[10px] uppercase font-bold text-gray-500 tracking-[0.2em] mb-3">Today's Total Stored</p>
            <h2 id="todayTime" class="text-6xl font-black golden-text">00:00:00</h2>
            <div class="mt-5 flex justify-center items-center gap-2">
                <span id="diffTag" class="tag-premium">Syncing...</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="stat-card">
                <p class="text-[10px] uppercase font-bold text-gray-500 mb-2">Habits Hit</p>
                <p id="habitsCount" class="text-2xl font-black text-[#64FFDA]">0</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] uppercase font-bold text-gray-500 mb-2">Study Days Avg</p>
                <p id="weekAvg" class="text-2xl font-black">0.0h</p>
            </div>
        </div>

        <div class="stat-card">
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-8">7-Day Consistency Curve</h3>
            <div style="height: 220px;">
                <canvas id="growthChart"></canvas>
            </div>
        </div>

        <div class="stat-card border-l-4 border-pink-500">
            <h3 class="text-gray-400 font-bold text-[10px] uppercase mb-2">AIR 1 Insight for Shivang</h3>
            <p id="rankMotivation" class="text-sm italic leading-relaxed text-gray-200">
                "Keep the hourglass flipping. Every second recorded here is a step closer to SSC Domination."
            </p>
        </div>

    </main>

    <script>
        function formatSeconds(seconds) {
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function initAnalytics() {
            const historyData = JSON.parse(localStorage.getItem('studyTimeData')) || {};
            const habitData = JSON.parse(localStorage.getItem('ssc_domination_v1')) || [];
            const todayKey = new Date().toISOString().split('T')[0];
            const todayNum = new Date().getDate() - 1;

            // 1. Today's Time (From Stored Data)
            const todaySeconds = historyData[todayKey] || 0;
            document.getElementById('todayTime').innerText = formatSeconds(todaySeconds);

            // 2. Habit Sync
            let dailyDone = 0;
            habitData.forEach(row => { if(row[todayNum]) dailyDone++; });
            document.getElementById('habitsCount').innerText = dailyDone + " / 12";

            // 3. Chart & Smart Average Logic
            const labels = [];
            const dataPoints = []; // Stores numeric hours
            
            for (let i = 6; i >= 0; i--) {
                let d = new Date();
                d.setDate(d.getDate() - i);
                let key = d.toISOString().split('T')[0];
                labels.push(d.toLocaleDateString('en-US', { weekday: 'short' }));
                
                let seconds = historyData[key] || 0;
                dataPoints.push(seconds / 3600); // Store as Raw Number
            }

            const totalHours = dataPoints.reduce((a, b) => a + b, 0);
            const activeDays = dataPoints.filter(h => h > 0).length;
            
            // Smart Average: Only divide by days you actually studied
            const avgHours = activeDays > 0 ? (totalHours / activeDays).toFixed(1) : "0.0";
            document.getElementById('weekAvg').innerText = avgHours + "h";

            // 4. Growth Tag Fix (Infinity & Zero Check)
            const yesterdayVal = dataPoints[5]; // 2nd last item
            const todayVal = dataPoints[6];     // last item
            const diffTag = document.getElementById('diffTag');
            
            if (yesterdayVal > 0) {
                const percent = (((todayVal - yesterdayVal) / yesterdayVal) * 100).toFixed(1);
                diffTag.innerText = (percent >= 0 ? '↑ ' : '↓ ') + Math.abs(percent) + "% vs Yesterday";
            } else {
                diffTag.innerText = todayVal > 0 ? "New Streak Started" : "No Data Yesterday";
            }

            // 5. Ranker's Motivation
            const mot = document.getElementById('rankMotivation');
            const numericAvg = parseFloat(avgHours);
            if (numericAvg >= 10 && dailyDone >= 10) mot.innerText = "Shivang, your stats are GOD-TIER. This is pure AIR 1 material. Stay focused.";
            else if (numericAvg >= 6) mot.innerText = "Selection Zone active. You are outperforming 99% of the crowd. Keep it up.";
            else mot.innerText = "Warrior, SSC CGL is a battle of consistency. Increase your average and hit more habits!";

            // 6. Chart.js Render
            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataPoints.map(h => h.toFixed(2)), // Format for display
                        borderColor: '#d17fb1',
                        borderWidth: 4, tension: 0.4, pointRadius: 5,
                        pointBackgroundColor: '#d17fb1', fill: true,
                        backgroundColor: 'rgba(209, 127, 177, 0.05)'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false, beginAtZero: true },
                        x: { grid: { display: false }, ticks: { color: '#555', font: { size: 10, weight: 'bold' } } }
                    }
                }
            });
        }

        window.onload = initAnalytics;
    </script>
</body>
</html>
