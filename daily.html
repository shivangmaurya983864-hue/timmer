<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSC CGL Domination System | Shivang</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-deep: #050a18; 
            --card-dark: #112240; 
            --text-cream: #E1E1C7; 
            --text-muted: #8892b0; 
            --accent-neon: #64FFDA; 
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .aura-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(100, 255, 218, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(225, 225, 199, 0.02) 0%, transparent 40%);
            z-index: -1;
        }

        .floating-header {
            position: fixed; top: 15px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            width: 90%; max-width: 400px;
        }

        .header-glass {
            background: rgba(17, 34, 64, 0.8);
            backdrop-filter: blur(12px);
            padding: 12px 25px; border-radius: 50px;
            border: 1px solid rgba(225,225,199,0.1);
            display: flex; align-items: center; justify-content: space-between;
        }

        .main-wrapper { margin-top: 100px; padding: 20px; padding-bottom: 40px; }

        .card-advance {
            background: var(--card-dark); border-radius: 28px;
            padding: 24px; margin-bottom: 25px;
            border: 1px solid rgba(225, 225, 199, 0.05);
        }

        .table-clip {
            overflow-x: auto; border-radius: 20px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(225,225,199,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        
        th { 
            background: rgba(17, 34, 64, 0.5); padding: 15px 5px; 
            font-size: 10px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .habit-title {
            position: sticky; left: 0;
            background: var(--card-dark) !important;
            padding: 15px; font-weight: 700;
            color: var(--text-cream); border-right: 1px solid rgba(225,225,199,0.1);
            z-index: 10; font-size: 13px;
        }

        input[type="checkbox"] {
            appearance: none; width: 22px; height: 22px;
            border-radius: 6px; border: 2px solid var(--text-muted);
            cursor: pointer; transition: 0.3s; position: relative;
        }

        input[type="checkbox"]:checked {
            background: var(--accent-neon); border-color: var(--accent-neon);
            box-shadow: 0 0 10px rgba(100, 255, 218, 0.5);
        }

        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: var(--bg-deep); font-size: 12px;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .stat-pill {
            background: var(--card-dark); border-radius: 20px;
            padding: 18px; text-align: center; border: 1px solid rgba(225,225,199,0.05);
        }

        .stat-val { font-size: 24px; font-weight: 800; color: var(--accent-neon); }
        .stat-label { font-size: 10px; letter-spacing: 1px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="aura-bg"></div>

    <div class="floating-header">
        <div class="header-glass">
            <a href="index.html" class="text-white opacity-50"><i class="fas fa-chevron-left"></i></a>
            <h1 class="text-[#E1E1C7] text-sm font-bold tracking-widest uppercase">SHIVANG | <span class="text-[#64FFDA]">DOMINATION</span></h1>
            <div class="w-4"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <!-- New Stats Row -->
        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="stat-pill">
                <p class="stat-label">MONTHLY</p>
                <div id="scoreVal" class="stat-val text-sm">0%</div>
            </div>
            <div class="stat-pill">
                <p class="stat-label">TODAY</p>
                <div id="todayHabits" class="stat-val text-sm">0/12</div>
            </div>
            <div class="stat-pill">
                <p class="stat-label">TOTAL</p>
                <div id="doneVal" class="stat-val text-sm">0</div>
            </div>
        </div>

        <div class="card-advance relative">
            <h3 class="text-xs font-bold uppercase tracking-widest text-[#8892b0] mb-6">SSC Performance Map</h3>
            <div style="height: 220px;"><canvas id="overallChart"></canvas></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 mt-4 text-center">
                <span id="leftVal" class="text-4xl font-black block text-[#E1E1C7]">0</span>
                <span class="text-[8px] uppercase text-[#8892b0] font-bold tracking-wider">Left</span>
            </div>
        </div>

        <div class="card-advance">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xs font-bold uppercase tracking-widest text-[#8892b0]">Consistency Grid</h3>
                <span class="text-[10px] bg-[#64FFDA]/10 text-[#64FFDA] px-3 py-1 rounded-full font-bold">Scroll Right →</span>
            </div>
            <div class="table-clip">
                <table id="gridTable"></table>
            </div>
        </div>
    </div>

    <script>
        const habits = [
            "Early Rise ☀️", "Math Practice 🔢", "Reasoning 🧠", "English 📖",
            "GK / GS 🌍", "Previous Year Questions 📊", "Mock Test 📝",
            "Revision 🔄", "Speed Practice ⚡", "Focus Mode 📵", "Workout 💪", "Sleep 7-8h 🌙"
        ];

        const days = 31;
        let data = JSON.parse(localStorage.getItem("ssc_domination_v1")) || Array(habits.length).fill().map(() => Array(days).fill(0));
        let charts = {};

        // 🔥 MONTHLY RESET LOGIC
        function checkMonthlyReset() {
            let currentMonth = new Date().getMonth();
            let savedMonth = localStorage.getItem("savedMonth");
            if (savedMonth != currentMonth) {
                data = Array(habits.length).fill().map(() => Array(days).fill(0));
                localStorage.setItem("ssc_domination_v1", JSON.stringify(data));
                localStorage.setItem("savedMonth", currentMonth);
            }
        }

        // 🔥 ACCURATE AUTO-SYNC LOGIC
        function syncWithTimer() {
            let todayDateKey = new Date().toISOString().split("T")[0];
            let studyData = JSON.parse(localStorage.getItem("studyTimeData")) || {};
            
            // Get ONLY today's study seconds
            const todayStudySeconds = studyData[todayDateKey] || 0;
            const todayIdx = new Date().getDate() - 1;

            let changed = false;

            // Tier 1: 1 Hour (Basic Consistency)
            if (todayStudySeconds >= 3600) {
                ["Math Practice 🔢", "Focus Mode 📵"].forEach(h => {
                    let idx = habits.indexOf(h);
                    if(data[idx][todayIdx] === 0) { data[idx][todayIdx] = 1; changed = true; }
                });
            }

            // Tier 2: 4 Hours (Deep Work)
            if (todayStudySeconds >= 4 * 3600) {
                ["Reasoning 🧠", "Revision 🔄"].forEach(h => {
                    let idx = habits.indexOf(h);
                    if(data[idx][todayIdx] === 0) { data[idx][todayIdx] = 1; changed = true; }
                });
            }

            // Tier 3: 8 Hours (Domination)
            if (todayStudySeconds >= 8 * 3600) {
                ["Previous Year Questions 📊", "Speed Practice ⚡"].forEach(h => {
                    let idx = habits.indexOf(h);
                    if(data[idx][todayIdx] === 0) { data[idx][todayIdx] = 1; changed = true; }
                });
            }

            if(changed) localStorage.setItem("ssc_domination_v1", JSON.stringify(data));
        }

        function init() {
            checkMonthlyReset();
            syncWithTimer();
            renderTable();
            setupCharts();
            updateDashboard();
        }

        function renderTable() {
            let header = `<tr><th class="habit-title">Activity</th>` + Array.from({length: days}, (_, i) => `<th>${i + 1}</th>`).join("") + "</tr>";
            let rows = habits.map((h, hIdx) => {
                let cells = data[hIdx].map((v, dIdx) => 
                    `<td><input type="checkbox" ${v ? "checked" : ""} onchange="toggle(${hIdx},${dIdx})"></td>`
                ).join("");
                return `<tr><td class="habit-title">${h}</td>${cells}</tr>`;
            }).join("");
            document.getElementById("gridTable").innerHTML = header + rows;
        }

        function toggle(h, d) {
            data[h][d] = data[h][d] ? 0 : 1;
            localStorage.setItem("ssc_domination_v1", JSON.stringify(data));
            updateDashboard();
        }

        function setupCharts() {
            charts.overall = new Chart(document.getElementById("overallChart"), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ['#64FFDA', 'rgba(100, 255, 218, 0.05)'],
                        borderWidth: 0, borderRadius: 15
                    }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
            });
        }

        function updateDashboard() {
            let total = habits.length * days;
            let done = 0;
            const todayIdx = new Date().getDate() - 1;
            let todayDone = 0;

            data.forEach((row, hIdx) => { 
                row.forEach((v, dIdx) => { 
                    if (v) {
                        done++;
                        if(dIdx === todayIdx) todayDone++;
                    }
                }); 
            });

            document.getElementById("doneVal").innerText = done;
            document.getElementById("todayHabits").innerText = todayDone + "/12";
            document.getElementById("scoreVal").innerText = Math.round((done / total) * 100) + "%";
            document.getElementById("leftVal").innerText = total - done;

            charts.overall.data.datasets[0].data = [done, total - done];
            charts.overall.update();
        }

        window.onload = init;
    </script>
</body>
</html>
